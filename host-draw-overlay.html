<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw; height: 100vh;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="file-layer" style="position:fixed;inset:0;pointer-events:none;z-index:5;"></div>
<script>
const { ipcRenderer } = require('electron')

const canvas = document.getElementById('canvas')
const ctx    = canvas.getContext('2d')

canvas.width  = window.innerWidth
canvas.height = window.innerHeight
console.log(`[HOST INIT] canvas=${canvas.width}x${canvas.height} devicePixelRatio=${window.devicePixelRatio}`)

window.addEventListener('resize', () => {
  const snapshot = canvas.toDataURL()
  canvas.width  = window.innerWidth
  canvas.height = window.innerHeight
  const img = new Image()
  img.onload = () => ctx.drawImage(img, 0, 0)
  img.src = snapshot
})

function drawLine(x0, y0, x1, y1, color, size) {
  const dist = Math.sqrt((x1-x0)**2 + (y1-y0)**2)
  const steps = Math.max(1, Math.ceil(dist / (size * 0.5)))
  ctx.beginPath()
  ctx.strokeStyle = color
  ctx.lineWidth   = size
  ctx.lineCap     = 'round'
  ctx.lineJoin    = 'round'
  ctx.moveTo(x0, y0)
  for (let i = 1; i <= steps; i++) {
    const t = i / steps
    ctx.lineTo(x0 + (x1-x0)*t, y0 + (y1-y0)*t)
  }
  ctx.stroke()
}

function eraseAt(x, y, size) {
  ctx.save()
  ctx.globalCompositeOperation = 'destination-out'
  ctx.beginPath()
  ctx.arc(x, y, size, 0, Math.PI * 2)
  ctx.fillStyle = 'rgba(0,0,0,1)'
  ctx.fill()
  ctx.restore()
}

function drawShape(tool, x0, y0, x1, y1, color, size) {
  ctx.strokeStyle = color
  ctx.lineWidth   = size
  ctx.lineCap     = 'round'
  ctx.lineJoin    = 'round'
  ctx.beginPath()
  if (tool === 'line') {
    ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke()
  } else if (tool === 'rect') {
    ctx.strokeRect(x0, y0, x1 - x0, y1 - y0)
  } else if (tool === 'arrow') {
    const angle   = Math.atan2(y1 - y0, x1 - x0)
    const headLen = Math.max(12, size * 3)
    ctx.moveTo(x0, y0); ctx.lineTo(x1, y1)
    ctx.lineTo(x1 - headLen * Math.cos(angle - Math.PI / 6), y1 - headLen * Math.sin(angle - Math.PI / 6))
    ctx.moveTo(x1, y1)
    ctx.lineTo(x1 - headLen * Math.cos(angle + Math.PI / 6), y1 - headLen * Math.sin(angle + Math.PI / 6))
    ctx.stroke()
  } else if (tool === 'circle') {
  const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2
  const rx = Math.abs(x1 - x0) / 2, ry = Math.abs(y1 - y0) / 2
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2)
  ctx.stroke()
  }
}

function floodFillHost(startX, startY, hex, opacity) {
  const W = canvas.width, H = canvas.height
  const imgData = ctx.getImageData(0, 0, W, H)
  const data = imgData.data
  const sx = Math.round(startX), sy = Math.round(startY)
  if (sx < 0 || sx >= W || sy < 0 || sy >= H) return
  const idx = (sy * W + sx) * 4
  const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3]
  const fillR = parseInt(hex.slice(1,3),16)
  const fillG = parseInt(hex.slice(3,5),16)
  const fillB = parseInt(hex.slice(5,7),16)
  const fillA = Math.round(opacity * 255)
  if (targetR===fillR && targetG===fillG && targetB===fillB && targetA===fillA) return
  const tolerance = 15
  function colorDist(i) {
    return Math.abs(data[i]-targetR) +
           Math.abs(data[i+1]-targetG) +
           Math.abs(data[i+2]-targetB) +
           Math.abs(data[i+3]-targetA)
  }
  const filled = new Uint8Array(W * H)
  const stack = [[sx, sy]]
  while (stack.length) {
    const [x, y] = stack.pop()
    if (x < 0 || x >= W || y < 0 || y >= H) continue
    const vi = y * W + x
    if (filled[vi]) continue
    const i = vi * 4
    if (colorDist(i) > tolerance * 4) continue
    filled[vi] = 1
    const srcA = fillA / 255
    const dstA = data[i+3] / 255
    const outA = srcA + dstA * (1 - srcA)
    if (outA > 0) {
      data[i]   = Math.round((fillR * srcA + data[i]   * dstA * (1-srcA)) / outA)
      data[i+1] = Math.round((fillG * srcA + data[i+1] * dstA * (1-srcA)) / outA)
      data[i+2] = Math.round((fillB * srcA + data[i+2] * dstA * (1-srcA)) / outA)
      data[i+3] = Math.round(outA * 255)
    }
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1])
  }
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const vi = y * W + x
      if (filled[vi]) continue
      const i = vi * 4
      if (data[i+3] === 0) continue
      const hasFilledNeighbor =
        (x > 0   && filled[vi-1]) ||
        (x < W-1 && filled[vi+1]) ||
        (y > 0   && filled[vi-W]) ||
        (y < H-1 && filled[vi+W])
      if (!hasFilledNeighbor) continue
      const t = 1 - (data[i+3] / 255)
      const srcA = (fillA / 255) * t
      const dstA = data[i+3] / 255
      const outA = srcA + dstA * (1 - srcA)
      if (outA > 0) {
        data[i]   = Math.round((fillR * srcA + data[i]   * dstA * (1-srcA)) / outA)
        data[i+1] = Math.round((fillG * srcA + data[i+1] * dstA * (1-srcA)) / outA)
        data[i+2] = Math.round((fillB * srcA + data[i+2] * dstA * (1-srcA)) / outA)
        data[i+3] = Math.round(outA * 255)
      }
    }
  }
  ctx.putImageData(imgData, 0, 0)
}

const PEER_LEFT = 0.1, PEER_TOP = 0.1, PEER_W = 0.8, PEER_H = 0.8

function toHostPx(nx, ny) {
  const x = nx * canvas.width
  const y = ny * canvas.height
  return { x, y }
}

function applyStroke(data) {
  const W = canvas.width
  const H = canvas.height
  const hex = data.color || '#ff4444'
  const r = parseInt(hex.slice(1, 3), 16)
  const g = parseInt(hex.slice(3, 5), 16)
  const b = parseInt(hex.slice(5, 7), 16)
  const color = `rgba(${r},${g},${b},${data.opacity || 0.9})`
  const hostScale = data.peerCanvasW ? (canvas.width / data.peerCanvasW) : 1
  const size = (data.size || 6) * hostScale

  if (data.type === 'pen') {
    const p0 = toHostPx(data.x0, data.y0), p1 = toHostPx(data.x1, data.y1)
    drawLine(p0.x, p0.y, p1.x, p1.y, color, size)
  } else if (data.type === 'eraser') {
    const p = toHostPx(data.x, data.y)
    eraseAt(p.x, p.y, data.size)
} else if (data.type === 'line' || data.type === 'rect' || data.type === 'arrow' || data.type === 'circle') {
    const p0 = toHostPx(data.x0, data.y0), p1 = toHostPx(data.x1, data.y1)
    drawShape(data.type, p0.x, p0.y, p1.x, p1.y, color, size)
  } else if (data.type === 'fill') {
    const p = toHostPx(data.x, data.y)
    floodFillHost(p.x, p.y, data.color || '#ff4444', data.opacity || 0.9)
  } else if (data.type === 'clear') {
    ctx.clearRect(0, 0, W, H)
  } else if (data.type === 'undo' || data.type === 'full-sync') {
    if (data.dataUrl) {
      const img = new Image()
      img.onload = () => {
        ctx.clearRect(0, 0, W, H)
        ctx.drawImage(img, 0, 0, W, H)
      }
      img.src = data.dataUrl
    } else {
      ctx.clearRect(0, 0, W, H)
    }
  }
}

ipcRenderer.on('draw-remote-stroke', (e, data) => applyStroke(data))
ipcRenderer.on('draw-clear', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); clearAllFiles() })

const fileLayer  = document.getElementById('file-layer')
const activeFiles = new Map()

function showRemoteFile(data) {
  const { id, dataUrl, x, y, width, height, duration, fileType } = data
  if (!dataUrl || !id) return
  const W = window.innerWidth
  const H = window.innerHeight

  let el
  if (fileType === 'video') {
    el = document.createElement('video')
    el.src = dataUrl
    el.autoplay = true
    el.loop = true
    el.muted = false
    el.playsInline = true
    el.controls = false
    el.style.objectFit = 'contain'
  } else if (fileType === 'audio') {
    el = document.createElement('audio')
    el.src = dataUrl
    el.autoplay = true
    el.controls = true
    el.style.height = '54px'
    el.style.width  = '100%'
  } else {
    el = document.createElement('img')
    el.src = dataUrl
    el.style.objectFit = 'contain'
  }

  el.dataset.relX = x
  el.dataset.relY = y
  el.dataset.relW = width
  el.dataset.relH = height
  el.style.position      = 'absolute'
  el.style.left          = (x * W) + 'px'
  el.style.top           = (y * H) + 'px'
  el.style.width         = (width  * W) + 'px'
  el.style.height        = (height * H) + 'px'
  el.style.borderRadius  = '8px'
  el.style.boxShadow     = '0 10px 36px rgba(0,0,0,0.55)'
  el.style.opacity       = '0'
  el.style.transform     = 'scale(0.96)'
  el.style.transition    = 'opacity .25s ease, transform .25s ease'

  fileLayer.appendChild(el)
  requestAnimationFrame(() => {
    el.style.opacity   = '1'
    el.style.transform = 'scale(1)'
  })

  const dur   = Math.max(500, duration || 5000)
  const timer = setTimeout(() => removeFile(id), dur)
  activeFiles.set(id, { img: el, timer })
}

function removeFile(id) {
  const entry = activeFiles.get(id)
  if (!entry) return
  clearTimeout(entry.timer)
  entry.img.style.opacity   = '0'
  entry.img.style.transform = 'scale(0.96)'
  setTimeout(() => entry.img.remove(), 280)
  activeFiles.delete(id)
}

function clearAllFiles() {
  for (const id of Array.from(activeFiles.keys())) removeFile(id)
}

window.addEventListener('resize', () => {
  const W = window.innerWidth
  const H = window.innerHeight
  for (const { img } of activeFiles.values()) {
    img.style.left   = (parseFloat(img.dataset.relX) * W) + 'px'
    img.style.top    = (parseFloat(img.dataset.relY) * H) + 'px'
    img.style.width  = (parseFloat(img.dataset.relW) * W) + 'px'
    img.style.height = (parseFloat(img.dataset.relH) * H) + 'px'
  }
})

ipcRenderer.on('draw-file-show', (e, data) => showRemoteFile(data))

let captureStream   = null
let captureInterval = null
let captureCanvas   = null
let captureCtx      = null
let capturePending  = false

async function startCapture({ sourceId, capW, capH, fps, quality }) {
  console.log('[Capture] capture-start reçu, sourceId:', sourceId)
  stopCapture()

  try {
    captureStream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        mandatory: {
          chromeMediaSource:   'desktop',
          chromeMediaSourceId: sourceId,
          maxWidth:            capW,
          maxHeight:           capH,
          maxFrameRate:        fps
        }
      }
    })
    console.log('[Capture] getUserMedia OK, stream actif')

    const video = document.createElement('video')
    video.srcObject = captureStream
    await video.play()

    captureCanvas        = document.createElement('canvas')
    captureCanvas.width  = capW
    captureCanvas.height = capH
    captureCtx           = captureCanvas.getContext('2d')

    const intervalMs = Math.round(1000 / Math.max(1, Math.min(30, fps)))

    captureInterval = setInterval(() => {
      if (capturePending || !video.videoWidth) return
      capturePending = true
      try {
        captureCtx.drawImage(video, 0, 0, capW, capH)
        const dataUrl = captureCanvas.toDataURL('image/jpeg', quality)
        ipcRenderer.send('capture-frame', dataUrl)
      } catch (err) {
        console.error('[Capture] frame erreur:', err.message)
      } finally {
        capturePending = false
      }
    }, intervalMs)

  } catch (err) {
    console.error('[Capture] getUserMedia erreur:', err.message)
  }
}

function stopCapture() {
  clearInterval(captureInterval)
  captureInterval = null
  if (captureStream) {
    captureStream.getTracks().forEach(t => t.stop())
    captureStream = null
  }
  captureCanvas  = null
  captureCtx     = null
  capturePending = false
  console.log('[Capture] capture arrêtée')
}

ipcRenderer.on('capture-start', (e, params) => startCapture(params))
ipcRenderer.on('capture-stop',  ()           => stopCapture())
</script>
</body>
</html>
