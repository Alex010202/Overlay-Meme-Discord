<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw; height: 100vh;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const { ipcRenderer } = require('electron')

const canvas = document.getElementById('canvas')
const ctx    = canvas.getContext('2d')

canvas.width  = window.innerWidth
canvas.height = window.innerHeight

window.addEventListener('resize', () => {
  const snapshot = canvas.toDataURL()
  canvas.width  = window.innerWidth
  canvas.height = window.innerHeight
  const img = new Image()
  img.onload = () => ctx.drawImage(img, 0, 0)
  img.src = snapshot
})

// ── Draw primitives ──────────────────────────────────────────────
function drawLine(x0, y0, x1, y1, color, size) {
  ctx.beginPath()
  ctx.strokeStyle = color
  ctx.lineWidth   = size
  ctx.lineCap     = 'round'
  ctx.lineJoin    = 'round'
  ctx.moveTo(x0, y0)
  ctx.lineTo(x1, y1)
  ctx.stroke()
}

function eraseAt(x, y, size) {
  ctx.save()
  ctx.globalCompositeOperation = 'destination-out'
  ctx.beginPath()
  ctx.arc(x, y, size, 0, Math.PI * 2)
  ctx.fillStyle = 'rgba(0,0,0,1)'
  ctx.fill()
  ctx.restore()
}

function drawShape(tool, x0, y0, x1, y1, color, size) {
  ctx.strokeStyle = color
  ctx.lineWidth   = size
  ctx.lineCap     = 'round'
  ctx.lineJoin    = 'round'
  ctx.beginPath()
  if (tool === 'line') {
    ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke()
  } else if (tool === 'rect') {
    ctx.strokeRect(x0, y0, x1 - x0, y1 - y0)
  } else if (tool === 'arrow') {
    const angle   = Math.atan2(y1 - y0, x1 - x0)
    const headLen = Math.max(12, size * 3)
    ctx.moveTo(x0, y0); ctx.lineTo(x1, y1)
    ctx.lineTo(x1 - headLen * Math.cos(angle - Math.PI / 6), y1 - headLen * Math.sin(angle - Math.PI / 6))
    ctx.moveTo(x1, y1)
    ctx.lineTo(x1 - headLen * Math.cos(angle + Math.PI / 6), y1 - headLen * Math.sin(angle + Math.PI / 6))
    ctx.stroke()
  }
}

// ── Apply remote stroke ──────────────────────────────────────────
function applyStroke(data) {
  const W = canvas.width
  const H = canvas.height
  const hex = data.color || '#ff4444'
  const r = parseInt(hex.slice(1, 3), 16)
  const g = parseInt(hex.slice(3, 5), 16)
  const b = parseInt(hex.slice(5, 7), 16)
  const color = `rgba(${r},${g},${b},${data.opacity || 0.9})`
  const size  = data.size || 6

  if (data.type === 'pen') {
    drawLine(data.x0 * W, data.y0 * H, data.x1 * W, data.y1 * H, color, size)
  } else if (data.type === 'eraser') {
    eraseAt(data.x * W, data.y * H, data.size)
  } else if (data.type === 'line' || data.type === 'rect' || data.type === 'arrow') {
    drawShape(data.type, data.x0 * W, data.y0 * H, data.x1 * W, data.y1 * H, color, size)
  } else if (data.type === 'clear') {
    ctx.clearRect(0, 0, W, H)
  } else if (data.type === 'undo' || data.type === 'full-sync') {
    if (data.dataUrl) {
      const img = new Image()
      img.onload = () => { ctx.clearRect(0, 0, W, H); ctx.drawImage(img, 0, 0) }
      img.src = data.dataUrl
    } else {
      ctx.clearRect(0, 0, W, H)
    }
  }
}

ipcRenderer.on('draw-remote-stroke', (e, data) => applyStroke(data))

// Clear canvas when session ends
ipcRenderer.on('draw-clear', () => ctx.clearRect(0, 0, canvas.width, canvas.height))
</script>
</body>
</html>
