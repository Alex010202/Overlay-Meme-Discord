<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      user-select: none;
      -webkit-user-select: none;
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    /* Floating toolbar */
    #toolbar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(13,14,16,0.92);
      border: 1px solid rgba(88,101,242,0.3);
      border-radius: 12px;
      padding: 8px 12px;
      backdrop-filter: blur(10px);
      z-index: 9999;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      transition: opacity 0.2s;
    }

    #toolbar:hover { opacity: 1 !important; }

    .tb-sep {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      margin: 0 2px;
    }

    .tb-btn {
      width: 30px; height: 30px;
      border: none; border-radius: 7px;
      background: transparent;
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.08); color: white; }
    .tb-btn.active { background: rgba(88,101,242,0.2); color: #5865F2; }
    .tb-btn.danger:hover { background: rgba(237,66,69,0.2); color: #ed4245; }

    /* Color swatches */
    .color-swatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: white; transform: scale(1.15); }

    /* Size slider */
    #size-slider {
      width: 60px;
      accent-color: #5865F2;
      cursor: pointer;
      height: 3px;
    }

    /* Opacity slider */
    #opacity-slider {
      width: 50px;
      accent-color: #5865F2;
      cursor: pointer;
      height: 3px;
    }

    /* Remote cursor */
    .remote-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: left 0.03s linear, top 0.03s linear;
    }
    .remote-cursor-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 6px rgba(0,0,0,0.8);
    }
    .remote-cursor-label {
      position: absolute;
      top: 14px; left: 6px;
      font-size: 10px; font-weight: 600;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 1px 5px;
      border-radius: 4px;
      white-space: nowrap;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Screen preview mode */
    #screen-preview {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    #screen-preview.active { display: flex; }
    #screen-preview img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      opacity: 0.15;
    }

    /* Flash feedback */
    #flash {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(88,101,242,0.9);
      color: white;
      font-size: 12px;
      font-family: 'Segoe UI', sans-serif;
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 99999;
    }
    #flash.show { opacity: 1; }
  </style>
</head>
<body>

<div id="screen-preview">
  <img id="screen-img" src="" alt="">
</div>

<canvas id="canvas"></canvas>

<div id="toolbar">
  <!-- Tools -->
  <button class="tb-btn active" id="tool-pen" title="Stylo (P)" onclick="setTool('pen')">✏️</button>
  <button class="tb-btn" id="tool-line" title="Ligne (L)" onclick="setTool('line')">╱</button>
  <button class="tb-btn" id="tool-rect" title="Rectangle (R)" onclick="setTool('rect')">▭</button>
  <button class="tb-btn" id="tool-arrow" title="Flèche (A)" onclick="setTool('arrow')">→</button>
  <button class="tb-btn" id="tool-eraser" title="Gomme (E)" onclick="setTool('eraser')">⬜</button>

  <div class="tb-sep"></div>

  <!-- Colors -->
  <div class="color-swatch active" style="background:#ff4444;" data-color="#ff4444" onclick="setColor(this)" title="Rouge"></div>
  <div class="color-swatch" style="background:#ffd93d;" data-color="#ffd93d" onclick="setColor(this)" title="Jaune"></div>
  <div class="color-swatch" style="background:#6bcb77;" data-color="#6bcb77" onclick="setColor(this)" title="Vert"></div>
  <div class="color-swatch" style="background:#4d96ff;" data-color="#4d96ff" onclick="setColor(this)" title="Bleu"></div>
  <div class="color-swatch" style="background:#ff6b9d;" data-color="#ff6b9d" onclick="setColor(this)" title="Rose"></div>
  <div class="color-swatch" style="background:#ffffff;" data-color="#ffffff" onclick="setColor(this)" title="Blanc"></div>

  <div class="tb-sep"></div>

  <!-- Size -->
  <span style="font-size:10px;color:rgba(255,255,255,0.35);font-family:'Segoe UI',sans-serif;">⬤</span>
  <input type="range" id="size-slider" min="2" max="40" value="6" title="Taille">

  <div class="tb-sep"></div>

  <!-- Opacity -->
  <span style="font-size:10px;color:rgba(255,255,255,0.35);font-family:'Segoe UI',sans-serif;">◐</span>
  <input type="range" id="opacity-slider" min="10" max="100" value="90" title="Opacité">

  <div class="tb-sep"></div>

  <!-- Actions -->
  <button class="tb-btn" id="btn-undo" title="Annuler (Ctrl+Z)" onclick="undo()">↩</button>
  <button class="tb-btn danger" id="btn-clear" title="Effacer tout" onclick="clearAll()">🗑</button>
  <button class="tb-btn" id="btn-hide" title="Masquer la toolbar" onclick="toggleToolbar()">👁</button>
</div>

<div id="flash"></div>

<script>
const { ipcRenderer } = require('electron')

const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')

// State
let currentTool = 'pen'
let currentColor = '#ff4444'
let brushSize = 6
let brushOpacity = 0.9
let isDrawing = false
let lastX = 0, lastY = 0
let startX = 0, startY = 0
let history = []
let historyIndex = -1
let toolbarVisible = true

// Remote cursors map: peerId -> {el, color}
const remoteCursors = {}

function resize() {
  const snapshot = canvas.toDataURL()
  canvas.width = window.innerWidth
  canvas.height = window.innerHeight
  const img = new Image()
  img.onload = () => ctx.drawImage(img, 0, 0)
  img.src = snapshot
}

window.addEventListener('resize', resize)
resize()

// ─── Tools ─────────────────────────────────────────────
function setTool(tool) {
  currentTool = tool
  document.querySelectorAll('.tb-btn[id^="tool-"]').forEach(b => b.classList.remove('active'))
  document.getElementById('tool-' + tool)?.classList.add('active')
  canvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair'
}

function setColor(el) {
  currentColor = el.dataset.color
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'))
  el.classList.add('active')
}

document.getElementById('size-slider').addEventListener('input', (e) => {
  brushSize = parseInt(e.target.value)
})

document.getElementById('opacity-slider').addEventListener('input', (e) => {
  brushOpacity = parseInt(e.target.value) / 100
})

// ─── Canvas snapshot for undo ─────────────────────────
function saveSnapshot() {
  if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1)
  history.push(canvas.toDataURL())
  historyIndex++
  if (history.length > 30) { history.shift(); historyIndex-- }
}

function undo() {
  if (historyIndex <= 0) { clearCanvas(); historyIndex = -1; history = []; return }
  historyIndex--
  const img = new Image()
  img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0) }
  img.src = history[historyIndex]
  ipcRenderer.send('draw-sync', { type: 'undo', historyIndex })
}

function clearAll() {
  saveSnapshot()
  clearCanvas()
  ipcRenderer.send('draw-sync', { type: 'clear' })
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)
}

// ─── Drawing ──────────────────────────────────────────
let previewSnapshot = null

function getColor() {
  if (currentTool === 'eraser') return null
  const hex = currentColor
  const r = parseInt(hex.slice(1,3), 16)
  const g = parseInt(hex.slice(3,5), 16)
  const b = parseInt(hex.slice(5,7), 16)
  return `rgba(${r},${g},${b},${brushOpacity})`
}

canvas.addEventListener('mousedown', (e) => {
  isDrawing = true
  lastX = e.clientX; lastY = e.clientY
  startX = e.clientX; startY = e.clientY

  if (currentTool === 'pen' || currentTool === 'eraser') {
    ctx.beginPath()
    ctx.moveTo(lastX, lastY)
    saveSnapshot()
  } else {
    previewSnapshot = canvas.toDataURL()
  }
})

canvas.addEventListener('mousemove', (e) => {
  // Broadcast cursor position
  ipcRenderer.send('draw-cursor', { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight })

  if (!isDrawing) return
  const x = e.clientX, y = e.clientY

  if (currentTool === 'pen') {
    drawLine(ctx, lastX, lastY, x, y, getColor(), brushSize)
    ipcRenderer.send('draw-sync', {
      type: 'pen', x0: lastX / canvas.width, y0: lastY / canvas.height,
      x1: x / canvas.width, y1: y / canvas.height,
      color: currentColor, size: brushSize, opacity: brushOpacity
    })
    lastX = x; lastY = y
  } else if (currentTool === 'eraser') {
    eraseAt(ctx, x, y, brushSize * 2)
    ipcRenderer.send('draw-sync', {
      type: 'eraser', x: x / canvas.width, y: y / canvas.height,
      size: brushSize * 2
    })
    lastX = x; lastY = y
  } else {
    // Preview mode for shape tools
    const img = new Image()
    img.onload = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height)
      ctx.drawImage(img, 0, 0)
      drawShape(ctx, currentTool, startX, startY, x, y, getColor(), brushSize)
    }
    img.src = previewSnapshot
  }
})

canvas.addEventListener('mouseup', (e) => {
  if (!isDrawing) return
  isDrawing = false
  const x = e.clientX, y = e.clientY

  if (currentTool === 'line' || currentTool === 'rect' || currentTool === 'arrow') {
    const img = new Image()
    img.onload = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height)
      ctx.drawImage(img, 0, 0)
      drawShape(ctx, currentTool, startX, startY, x, y, getColor(), brushSize)
      saveSnapshot()
      ipcRenderer.send('draw-sync', {
        type: currentTool,
        x0: startX / canvas.width, y0: startY / canvas.height,
        x1: x / canvas.width, y1: y / canvas.height,
        color: currentColor, size: brushSize, opacity: brushOpacity
      })
    }
    img.src = previewSnapshot
    previewSnapshot = null
  }
})

canvas.addEventListener('mouseleave', () => { isDrawing = false })

function drawLine(ctx, x0, y0, x1, y1, color, size) {
  ctx.beginPath()
  ctx.strokeStyle = color
  ctx.lineWidth = size
  ctx.lineCap = 'round'
  ctx.lineJoin = 'round'
  ctx.moveTo(x0, y0)
  ctx.lineTo(x1, y1)
  ctx.stroke()
}

function eraseAt(ctx, x, y, size) {
  ctx.save()
  ctx.globalCompositeOperation = 'destination-out'
  ctx.beginPath()
  ctx.arc(x, y, size, 0, Math.PI * 2)
  ctx.fillStyle = 'rgba(0,0,0,1)'
  ctx.fill()
  ctx.restore()
}

function drawShape(ctx, tool, x0, y0, x1, y1, color, size) {
  ctx.strokeStyle = color
  ctx.lineWidth = size
  ctx.lineCap = 'round'
  ctx.lineJoin = 'round'
  ctx.beginPath()

  if (tool === 'line') {
    ctx.moveTo(x0, y0)
    ctx.lineTo(x1, y1)
    ctx.stroke()
  } else if (tool === 'rect') {
    ctx.strokeRect(x0, y0, x1 - x0, y1 - y0)
  } else if (tool === 'arrow') {
    const angle = Math.atan2(y1 - y0, x1 - x0)
    const headLen = Math.max(12, size * 3)
    ctx.moveTo(x0, y0)
    ctx.lineTo(x1, y1)
    ctx.lineTo(x1 - headLen * Math.cos(angle - Math.PI / 6), y1 - headLen * Math.sin(angle - Math.PI / 6))
    ctx.moveTo(x1, y1)
    ctx.lineTo(x1 - headLen * Math.cos(angle + Math.PI / 6), y1 - headLen * Math.sin(angle + Math.PI / 6))
    ctx.stroke()
  }
}

// ─── Apply remote drawing ─────────────────────────────
function applyRemote(data) {
  const W = canvas.width, H = canvas.height
  const hex = data.color || '#ff4444'
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
  const color = `rgba(${r},${g},${b},${data.opacity || 0.9})`
  const size = (data.size || 6)

  if (data.type === 'pen') {
    drawLine(ctx, data.x0 * W, data.y0 * H, data.x1 * W, data.y1 * H, color, size)
  } else if (data.type === 'eraser') {
    eraseAt(ctx, data.x * W, data.y * H, data.size)
  } else if (data.type === 'line' || data.type === 'rect' || data.type === 'arrow') {
    drawShape(ctx, data.type, data.x0 * W, data.y0 * H, data.x1 * W, data.y1 * H, color, size)
  } else if (data.type === 'clear') {
    clearCanvas()
  } else if (data.type === 'full-sync') {
    const img = new Image()
    img.onload = () => { clearCanvas(); ctx.drawImage(img, 0, 0) }
    img.src = data.dataUrl
  }
}

// ─── Remote cursor ────────────────────────────────────
const CURSOR_COLORS = ['#ff6b9d','#4d96ff','#6bcb77','#ffd93d','#c084fc','#fb923c']
let cursorColorIdx = 0

function getOrCreateCursor(peerId, username) {
  if (remoteCursors[peerId]) return remoteCursors[peerId].el
  const color = CURSOR_COLORS[cursorColorIdx++ % CURSOR_COLORS.length]
  const el = document.createElement('div')
  el.className = 'remote-cursor'
  el.innerHTML = `
    <div class="remote-cursor-dot" style="background:${color};"></div>
    <div class="remote-cursor-label" style="background:${color};">${username || 'Pote'}</div>
  `
  document.body.appendChild(el)
  remoteCursors[peerId] = { el, color }
  return el
}

function updateRemoteCursor(peerId, username, nx, ny) {
  const el = getOrCreateCursor(peerId, username)
  el.style.left = (nx * window.innerWidth) + 'px'
  el.style.top = (ny * window.innerHeight) + 'px'
}

// ─── Toolbar ─────────────────────────────────────────
function toggleToolbar() {
  toolbarVisible = !toolbarVisible
  document.getElementById('toolbar').style.opacity = toolbarVisible ? '1' : '0.15'
}

// ─── Flash message ────────────────────────────────────
function flash(msg) {
  const el = document.getElementById('flash')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2000)
}

// ─── Screen preview ───────────────────────────────────
function setScreenPreview(dataUrl) {
  if (dataUrl) {
    document.getElementById('screen-img').src = dataUrl
    document.getElementById('screen-preview').classList.add('active')
  } else {
    document.getElementById('screen-preview').classList.remove('active')
  }
}

// ─── Keyboard shortcuts ──────────────────────────────
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); return }
  const keyMap = { p: 'pen', l: 'line', r: 'rect', a: 'arrow', e: 'eraser' }
  if (!e.ctrlKey && !e.metaKey && keyMap[e.key]) setTool(keyMap[e.key])
})

// ─── IPC from main ────────────────────────────────────
ipcRenderer.on('draw-remote-stroke', (e, data) => applyRemote(data))
ipcRenderer.on('draw-remote-cursor', (e, { peerId, username, x, y }) => updateRemoteCursor(peerId, username, x, y))
ipcRenderer.on('draw-screen-preview', (e, dataUrl) => setScreenPreview(dataUrl))

ipcRenderer.on('draw-peer-disconnected', (e, { peerId }) => {
  if (remoteCursors[peerId]) {
    remoteCursors[peerId].el.remove()
    delete remoteCursors[peerId]
  }
})

ipcRenderer.on('draw-request-sync', () => {
  ipcRenderer.send('draw-full-sync-request')
})

ipcRenderer.on('draw-send-sync', () => {
  ipcRenderer.send('draw-full-sync', canvas.toDataURL())
})

ipcRenderer.on('draw-flash', (e, msg) => flash(msg))
</script>
</body>
</html>
