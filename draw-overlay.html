<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0c0d0f;
      --surface:  #141517;
      --surface2: #1c1d21;
      --surface3: #242529;
      --border:   rgba(255,255,255,0.07);
      --accent:   #7c6ff7;
      --accent2:  #a89eff;
      --text:     rgba(255,255,255,0.88);
      --dim:      rgba(255,255,255,0.32);
      --danger:   #f04747;
    }

    body {
      background: var(--bg);
      overflow: hidden;
      width: 100vw; height: 100vh;
      user-select: none; -webkit-user-select: none;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    
    #draw-area {
      position: fixed;
      border-radius: 6px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(124,111,247,0.18),
        0 0 0 4px rgba(124,111,247,0.04),
        0 24px 64px rgba(0,0,0,0.8);
      cursor: crosshair;
      
    }

    #draw-area-label {
      position: absolute;
      top: -22px; left: 0;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--dim); white-space: nowrap;
      pointer-events: none;
    }

    #screen-img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: fill; display: none;
      pointer-events: none;
    }

    
    #canvas-bg, #canvas {
      position: absolute; top: 0; left: 0;
      display: block; width: 100%; height: 100%;
      touch-action: none;
    }
    #canvas { z-index: 1; }

    
    #empty-state {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      z-index: 2;
      gap: 12px;
      opacity: 1;
      transition: opacity 0.3s;
    }
    #empty-state.hidden { opacity: 0; }

    .es-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .es-grid::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%,
        transparent 30%, var(--bg) 100%);
    }

    .es-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }

    .es-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .es-icon svg {
      width: 24px; height: 24px;
      stroke: var(--accent2); fill: none;
      stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
    }

    .es-title {
      font-size: 15px; font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: -0.01em;
    }

    .es-shortcuts {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .es-key {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 10px; font-weight: 500;
      color: var(--dim);
    }
    .es-key kbd {
      background: var(--surface3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit; font-size: 9px;
      color: var(--accent2);
    }

    .es-waiting {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--dim);
    }
    .es-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.3; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.2); }
    }

    
    #toolbar {
      position: fixed;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 3px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px 10px;
      z-index: 9999;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.025) inset,
        0 8px 32px rgba(0,0,0,0.75),
        0 2px 8px rgba(0,0,0,0.4);
      height: 52px;
      backdrop-filter: blur(16px);
    }

    .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

    .tb-btn {
      position: relative;
      width: 34px; height: 34px;
      border: none; border-radius: 8px;
      background: transparent;
      color: var(--dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s, transform 0.1s;
      flex-shrink: 0;
    }
    .tb-btn svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none;
    }
    .tb-btn:hover  { background: var(--surface2); color: var(--text); }
    .tb-btn.active { background: rgba(124,111,247,0.14); color: var(--accent2); box-shadow: 0 0 0 1px rgba(124,111,247,0.28); }
    .tb-btn.danger:hover { background: rgba(240,71,71,0.14); color: var(--danger); }
    .tb-btn:active { transform: scale(0.9); }
    .tb-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }

    
    .tb-btn::after {
      content: attr(data-tip);
      position: absolute; top: calc(100% + 7px); left: 50%;
      transform: translateX(-50%);
      background: #18191d; color: var(--text);
      font-size: 10px; font-weight: 500; white-space: nowrap;
      padding: 3px 7px; border-radius: 5px;
      border: 1px solid var(--border);
      pointer-events: none; opacity: 0;
      transition: opacity 0.15s; z-index: 9999;
    }
    .tb-btn:hover::after { opacity: 1; }

    
    #color-palette { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

    .cdot {
      width: 17px; height: 17px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      flex-shrink: 0;
    }
    .cdot:hover  { transform: scale(1.18); }
    .cdot.active { border-color: white; transform: scale(1.18); box-shadow: 0 0 0 2px rgba(255,255,255,0.1); }

    #custom-color-btn {
      width: 17px; height: 17px; border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.2); cursor: pointer;
      background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red);
      flex-shrink: 0; transition: transform 0.12s;
    }
    #custom-color-btn:hover  { transform: scale(1.18); }
    #custom-color-btn.active { border: 2px solid white; transform: scale(1.18); }
    #hidden-color-input { position:absolute; opacity:0; width:0; height:0; pointer-events:none; }

    
    .slider-wrap { display:flex; align-items:center; gap:5px; flex-shrink:0; }
    .slabel { font-size:9px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); }
    .sval   { font-size:10px; font-weight:600; color:var(--dim); min-width:20px; text-align:right; }

    input[type=range] {
      -webkit-appearance:none; appearance:none;
      height:3px; border-radius:2px; background:var(--surface2);
      outline:none; cursor:pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:12px; height:12px;
      border-radius:50%; background:var(--accent2); cursor:pointer;
      box-shadow:0 0 0 3px rgba(168,158,255,.18); transition:box-shadow .12s;
    }
    input[type=range]:hover::-webkit-slider-thumb { box-shadow:0 0 0 4px rgba(168,158,255,.28); }
    #size-slider { width:60px; }
    #opacity-slider { width:50px; }

    #size-preview {
      width:10px; height:10px; border-radius:50%; background:white;
      flex-shrink:0; transition:all .1s;
    }

    
    .remote-cursor { position:fixed; pointer-events:none; z-index:9998; transform:translate(-4px,-4px); transition:left .03s linear,top .03s linear; }
    .remote-cursor-dot { width:9px; height:9px; border-radius:50%; border:2px solid rgba(255,255,255,.4); box-shadow:0 0 8px rgba(0,0,0,.8); }
    .remote-cursor-label { position:absolute; top:11px; left:3px; font-size:10px; font-weight:600; color:white; padding:2px 5px; border-radius:5px; white-space:nowrap; }

    
    #flash {
      position:fixed; bottom:22px; left:50%;
      transform:translateX(-50%) translateY(6px);
      background:var(--surface); border:1px solid var(--border);
      color:var(--text); font-size:11px; font-weight:500;
      padding:6px 14px; border-radius:20px;
      box-shadow:0 4px 16px rgba(0,0,0,.5);
      opacity:0; pointer-events:none;
      transition:opacity .18s, transform .18s;
      z-index:99999;
    }
    #flash.show { opacity:1; transform:translateX(-50%) translateY(0); }

    
    #infobar {
      position:fixed; bottom:14px; right:16px;
      display:flex; gap:10px; align-items:center;
      font-size:10px; font-weight:500; color:var(--dim);
      letter-spacing:.03em;
    }
    #infobar span { display:flex; align-items:center; gap:4px; }
  </style>
</head>
<body>

<div id="draw-area">
  <span id="draw-area-label"></span>
  <canvas id="canvas-bg"></canvas>
  <img id="screen-img" alt="">
  <canvas id="canvas"></canvas>

  
  <div id="empty-state">
    <div class="es-grid"></div>
    <div class="es-content">
      <div class="es-icon">
        <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div class="es-title">Zone de dessin</div>
      <div class="es-shortcuts">
        <div class="es-key"><kbd>P</kbd> Stylo</div>
        <div class="es-key"><kbd>L</kbd> Ligne</div>
        <div class="es-key"><kbd>R</kbd> Rect</div>
        <div class="es-key"><kbd>C</kbd> Cercle</div>
        <div class="es-key"><kbd>A</kbd> Flèche</div>
        <div class="es-key"><kbd>E</kbd> Gomme</div>
        <div class="es-key"><kbd>Ctrl</kbd>+<kbd>Z</kbd> Annuler</div>
        <div class="es-key"><kbd>Ctrl</kbd>+<kbd>Y</kbd> Rétablir</div>
      </div>
      <div class="es-waiting">
        <div class="es-dot"></div>
        En attente de connexion…
      </div>
    </div>
  </div>
</div>

<div id="toolbar">
  
  <button class="tb-btn active" id="tool-pen"    data-tip="Stylo (P)"      onclick="setTool('pen')">
    <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
  </button>
  <button class="tb-btn" id="tool-line"   data-tip="Ligne (L)"      onclick="setTool('line')">
    <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/></svg>
  </button>
  <button class="tb-btn" id="tool-rect"   data-tip="Rectangle (R)"  onclick="setTool('rect')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
  </button>
  <button class="tb-btn" id="tool-circle" data-tip="Cercle (C)"     onclick="setTool('circle')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
  </button>
  <button class="tb-btn" id="tool-arrow"  data-tip="Flèche (A)"     onclick="setTool('arrow')">
    <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="9 5 19 5 19 15"/></svg>
  </button>
  <button class="tb-btn" id="tool-eraser" data-tip="Gomme (E)"      onclick="setTool('eraser')">
    <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l11-11 6 6-3.5 3.5"/><line x1="6" y1="14" x2="14" y2="6"/></svg>
  </button>

  <div class="sep"></div>

  
  <div id="color-palette">
    <div class="cdot active" style="background:#ff4455" data-color="#ff4455" onclick="setColorDot(this)"></div>
    <div class="cdot" style="background:#ffcc00" data-color="#ffcc00" onclick="setColorDot(this)"></div>
    <div class="cdot" style="background:#00c472" data-color="#00c472" onclick="setColorDot(this)"></div>
    <div class="cdot" style="background:#4d96ff" data-color="#4d96ff" onclick="setColorDot(this)"></div>
    <div class="cdot" style="background:#c084fc" data-color="#c084fc" onclick="setColorDot(this)"></div>
    <div class="cdot" style="background:#ffffff" data-color="#ffffff" onclick="setColorDot(this)"></div>
    <div id="custom-color-btn" title="Couleur perso" onclick="openColorPicker()"></div>
    <input type="color" id="hidden-color-input" value="#ff4455" onchange="setCustomColor(this.value)">
  </div>

  <div class="sep"></div>

  
  <div class="slider-wrap">
    <div id="size-preview"></div>
    <input type="range" id="size-slider" min="2" max="40" value="6">
    <span class="sval" id="size-val">6</span>
  </div>

  <div class="sep"></div>

  
  <div class="slider-wrap">
    <span class="slabel">α</span>
    <input type="range" id="opacity-slider" min="10" max="100" value="90">
    <span class="sval" id="opacity-val">90%</span>
  </div>

  <div class="sep"></div>

  
  <button class="tb-btn" id="btn-undo" data-tip="Annuler (Ctrl+Z)" onclick="undo()">
    <svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
  </button>
  <button class="tb-btn" id="btn-redo" data-tip="Rétablir (Ctrl+Y)" onclick="redo()">
    <svg viewBox="0 0 24 24"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg>
  </button>
  <button class="tb-btn danger" id="btn-clear" data-tip="Effacer tout" onclick="clearAll()">
    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
  </button>
</div>

<div id="flash"></div>
<div id="infobar">
  <span id="info-res"></span>
  <span id="info-hist"></span>
</div>

<script>const { ipcRenderer } = require('electron')
const canvas    = document.getElementById('canvas')
const ctx       = canvas.getContext('2d')
const canvasBg  = document.getElementById('canvas-bg')
const ctxBg     = canvasBg.getContext('2d')
const drawArea  = document.getElementById('draw-area')
const screenImg = document.getElementById('screen-img')
const emptyState= document.getElementById('empty-state')
const MARGIN = 52
let CANVAS_W = 1280, CANVAS_H = 720
let areaX = 0, areaY = 0, areaW = 0, areaH = 0

let undoStack = []
let redoStack = []
const MAX_HISTORY = 60
function captureState() {
  return ctx.getImageData(0, 0, CANVAS_W, CANVAS_H)
}
function saveSnapshot() {
  undoStack.push(captureState())
  if (undoStack.length > MAX_HISTORY) undoStack.shift()
  redoStack = []
  updateHistoryUI()
}
function restoreState(imageData) {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H)
  ctx.putImageData(imageData, 0, 0)
}
function undo() {
  if (undoStack.length === 0) return
  redoStack.push(captureState())
  const prev = undoStack.pop()
  restoreState(prev)
  updateHistoryUI()
  checkEmptyState()
  flash('↩ Annulé')
  ipcRenderer.send('draw-sync', { type: 'undo', dataUrl: canvas.toDataURL('image/jpeg', 0.7) })
}
function redo() {
  if (redoStack.length === 0) return
  undoStack.push(captureState())
  const next = redoStack.pop()
  restoreState(next)
  updateHistoryUI()
  checkEmptyState()
  flash('↪ Rétabli')
  ipcRenderer.send('draw-sync', { type: 'undo', dataUrl: canvas.toDataURL('image/jpeg', 0.7) })
}
function updateHistoryUI() {
  document.getElementById('btn-undo').disabled = undoStack.length === 0
  document.getElementById('btn-redo').disabled = redoStack.length === 0
  document.getElementById('info-hist').textContent =
    undoStack.length > 0 ? `hist. ${undoStack.length}` : ''
}
function clearAll() {
  saveSnapshot()
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H)
  checkEmptyState()
  ipcRenderer.send('draw-sync', { type: 'clear' })
  flash('🗑 Canvas effacé')
}

function drawBg() {
  canvasBg.width  = CANVAS_W
  canvasBg.height = CANVAS_H
  ctxBg.fillStyle = '#111214'
  ctxBg.fillRect(0, 0, CANVAS_W, CANVAS_H)
  ctxBg.fillStyle = 'rgba(255,255,255,0.04)'
  const step = 32
  for (let x = step; x < CANVAS_W; x += step) {
    for (let y = step; y < CANVAS_H; y += step) {
      ctxBg.beginPath()
      ctxBg.arc(x, y, 1, 0, Math.PI*2)
      ctxBg.fill()
    }
  }
}
function layoutDrawArea() {
  const winW = window.innerWidth, winH = window.innerHeight
  const toolbarH = 68
  const availW = winW - MARGIN * 2
  const availH = winH - MARGIN * 2 - toolbarH
  const scale  = Math.min(availW / CANVAS_W, availH / CANVAS_H)
  areaW = Math.round(CANVAS_W * scale)
  areaH = Math.round(CANVAS_H * scale)
  areaX = Math.round((winW - areaW) / 2)
  areaY = Math.round(toolbarH + MARGIN + (availH - areaH) / 2)
  drawArea.style.cssText += `left:${areaX}px;top:${areaY}px;width:${areaW}px;height:${areaH}px;`
  const snap = (canvas.width > 0 && !isCanvasBlank()) ? captureState() : null
  canvas.width  = CANVAS_W
  canvas.height = CANVAS_H
  if (snap) restoreState(snap)
  drawBg()
}
function setCanvasSize(w, h, label) {
  CANVAS_W = w; CANVAS_H = h
  undoStack = []
  redoStack = []
  updateHistoryUI()
  document.getElementById('draw-area-label').textContent = label || `${w}×${h}`
  document.getElementById('info-res').textContent = `${w}×${h}`
  layoutDrawArea()
}
function isCanvasBlank() {
  const data = ctx.getImageData(0, 0, CANVAS_W, CANVAS_H).data
  for (let i = 3; i < data.length; i += 4) { if (data[i] > 0) return false }
  return true
}
function checkEmptyState() {
  const blank = isCanvasBlank() && screenImg.style.display === 'none'
  emptyState.classList.toggle('hidden', !blank)
}
window.addEventListener('resize', layoutDrawArea)
layoutDrawArea()
updateHistoryUI()

let currentTool  = 'pen'
let currentColor = '#ff4455'
let brushSize    = 6
let brushOpacity = 0.9
function setTool(tool) {
  currentTool = tool
  document.querySelectorAll('.tb-btn[id^="tool-"]').forEach(b => b.classList.remove('active'))
  document.getElementById('tool-' + tool)?.classList.add('active')
  drawArea.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair'
  updateSizePreview()
}
function setColorDot(el) {
  currentColor = el.dataset.color
  document.querySelectorAll('.cdot').forEach(s => s.classList.remove('active'))
  document.getElementById('custom-color-btn').classList.remove('active')
  el.classList.add('active')
  updateSizePreview()
}
function openColorPicker() { document.getElementById('hidden-color-input').click() }
function setCustomColor(hex) {
  currentColor = hex
  document.querySelectorAll('.cdot').forEach(s => s.classList.remove('active'))
  const btn = document.getElementById('custom-color-btn')
  btn.classList.add('active')
  btn.style.background = hex
  document.getElementById('custom-color-btn').style.cssText +=
    `background:${hex}; border:2px solid white;`
  updateSizePreview()
}
const sizeSlider    = document.getElementById('size-slider')
const opacitySlider = document.getElementById('opacity-slider')
function updateSizePreview() {
  const s   = Math.min(brushSize, 22)
  const col = currentTool === 'eraser' ? 'rgba(255,255,255,0.15)' : currentColor
  const el  = document.getElementById('size-preview')
  el.style.cssText = `width:${s}px;height:${s}px;border-radius:50%;background:${col};
    opacity:${brushOpacity};flex-shrink:0;transition:all .1s;`
}
sizeSlider.addEventListener('input', e => {
  brushSize = parseInt(e.target.value)
  document.getElementById('size-val').textContent = brushSize
  updateSizePreview()
})
opacitySlider.addEventListener('input', e => {
  brushOpacity = parseInt(e.target.value) / 100
  document.getElementById('opacity-val').textContent = parseInt(e.target.value) + '%'
  updateSizePreview()
})
updateSizePreview()

let isDrawing       = false
let lastX = 0, lastY = 0, startX = 0, startY = 0
let previewSnap     = null
function getColor() {
  if (currentTool === 'eraser') return null
  const hex = currentColor
  const r = parseInt(hex.slice(1,3),16)
  const g = parseInt(hex.slice(3,5),16)
  const b = parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${brushOpacity})`
}

function toCanvasClamped(clientX, clientY) {
  const rect = drawArea.getBoundingClientRect()
  return {
    x: Math.max(0, Math.min(CANVAS_W, (clientX - rect.left) * (CANVAS_W / areaW))),
    y: Math.max(0, Math.min(CANVAS_H, (clientY - rect.top)  * (CANVAS_H / areaH)))
  }
}
function commitShape(p) {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H)
  ctx.putImageData(previewSnap, 0, 0)
  drawShape(ctx, currentTool, startX, startY, p.x, p.y, getColor(), brushSize)
  ipcRenderer.send('draw-sync', {
    type: currentTool,
    x0: startX/CANVAS_W, y0: startY/CANVAS_H,
    x1: p.x/CANVAS_W,    y1: p.y/CANVAS_H,
    color: currentColor, size: brushSize, opacity: brushOpacity
  })
  previewSnap = null
}
const toolbar = document.getElementById('toolbar')
function isOnToolbar(e) {
  return toolbar.contains(e.target)
}
window.addEventListener('mousedown', e => {
  if (isOnToolbar(e)) return
  e.preventDefault()
  isDrawing = true
  const p = toCanvasClamped(e.clientX, e.clientY)
  lastX = p.x; lastY = p.y; startX = p.x; startY = p.y
  saveSnapshot()
  if (currentTool === 'pen' || currentTool === 'eraser') {
    ctx.beginPath(); ctx.moveTo(lastX, lastY)
  } else {
    previewSnap = captureState()
  }
})
let _lastCursorSend = 0
window.addEventListener('mousemove', e => {
  const p = toCanvasClamped(e.clientX, e.clientY)
  const now = Date.now()
  if (now - _lastCursorSend >= 50) {
    _lastCursorSend = now
    ipcRenderer.send('draw-cursor', { x: p.x / CANVAS_W, y: p.y / CANVAS_H })
  }
  if (!isDrawing) return
  if (currentTool === 'pen') {
    drawLine(ctx, lastX, lastY, p.x, p.y, getColor(), brushSize)
    ipcRenderer.send('draw-sync', {
      type:'pen',
      x0:lastX/CANVAS_W, y0:lastY/CANVAS_H,
      x1:p.x/CANVAS_W,   y1:p.y/CANVAS_H,
      color:currentColor, size:brushSize, opacity:brushOpacity
    })
    lastX = p.x; lastY = p.y
  } else if (currentTool === 'eraser') {
    eraseAt(ctx, p.x, p.y, brushSize * 2)
    ipcRenderer.send('draw-sync', { type:'eraser', x:p.x/CANVAS_W, y:p.y/CANVAS_H, size:brushSize*2 })
    lastX = p.x; lastY = p.y
  } else {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H)
    ctx.putImageData(previewSnap, 0, 0)
    drawShape(ctx, currentTool, startX, startY, p.x, p.y, getColor(), brushSize)
  }
})
window.addEventListener('mouseup', e => {
  if (!isDrawing) return
  isDrawing = false
  const p = toCanvasClamped(e.clientX, e.clientY)
  if (['line','rect','circle','arrow'].includes(currentTool) && previewSnap) {
    commitShape(p)
  }
  checkEmptyState()
})

function drawLine(ctx, x0, y0, x1, y1, color, size) {
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = size
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'
  ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke()
}
function eraseAt(ctx, x, y, size) {
  ctx.save(); ctx.globalCompositeOperation = 'destination-out'
  ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2)
  ctx.fillStyle = 'rgba(0,0,0,1)'; ctx.fill(); ctx.restore()
}
function drawShape(ctx, tool, x0, y0, x1, y1, color, size) {
  ctx.strokeStyle = color; ctx.lineWidth = size
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.beginPath()
  if (tool === 'line') {
    ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke()
  } else if (tool === 'rect') {
    ctx.strokeRect(x0, y0, x1-x0, y1-y0)
  } else if (tool === 'circle') {
    const cx=(x0+x1)/2, cy=(y0+y1)/2
    const rx=Math.abs(x1-x0)/2, ry=Math.abs(y1-y0)/2
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); ctx.stroke()
  } else if (tool === 'arrow') {
    const angle=Math.atan2(y1-y0,x1-x0), hl=Math.max(14,size*3.5)
    ctx.moveTo(x0,y0); ctx.lineTo(x1,y1)
    ctx.lineTo(x1-hl*Math.cos(angle-Math.PI/6), y1-hl*Math.sin(angle-Math.PI/6))
    ctx.moveTo(x1,y1)
    ctx.lineTo(x1-hl*Math.cos(angle+Math.PI/6), y1-hl*Math.sin(angle+Math.PI/6))
    ctx.stroke()
  }
}

function applyRemote(data) {
  const W=CANVAS_W, H=CANVAS_H
  const hex=data.color||'#ff4455'
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16)
  const color=`rgba(${r},${g},${b},${data.opacity??0.9})`
  const size=data.size||6
  if      (data.type==='pen')    drawLine(ctx,data.x0*W,data.y0*H,data.x1*W,data.y1*H,color,size)
  else if (data.type==='eraser') eraseAt(ctx,data.x*W,data.y*H,data.size)
  else if (['line','rect','circle','arrow'].includes(data.type))
    drawShape(ctx,data.type,data.x0*W,data.y0*H,data.x1*W,data.y1*H,color,size)
  else if (data.type==='clear') { ctx.clearRect(0,0,CANVAS_W,CANVAS_H); checkEmptyState() }
  else if (data.type==='undo'||data.type==='full-sync') {
    if (data.dataUrl) {
      const img=new Image()
      img.onload=()=>{ ctx.clearRect(0,0,CANVAS_W,CANVAS_H); ctx.drawImage(img,0,0); checkEmptyState() }
      img.src=data.dataUrl
    }
  }
}

const remoteCursors={}, CC=['#ff6b9d','#4d96ff','#6bcb77','#ffd93d','#c084fc','#fb923c']
let ccIdx=0
function getOrCreateCursor(id,name) {
  if(remoteCursors[id]) return remoteCursors[id].el
  const color=CC[ccIdx++%CC.length]
  const el=document.createElement('div'); el.className='remote-cursor'
  el.innerHTML=`<div class="remote-cursor-dot" style="background:${color}"></div>
    <div class="remote-cursor-label" style="background:${color}">${name||'Pote'}</div>`
  document.body.appendChild(el); remoteCursors[id]={el,color}; return el
}
function updateRemoteCursor(id,name,nx,ny) {
  const el=getOrCreateCursor(id,name)
  el.style.left=(areaX+nx*areaW)+'px'
  el.style.top=(areaY+ny*areaH)+'px'
}

let _ft=null
function flash(msg) {
  const el=document.getElementById('flash')
  el.textContent=msg; el.classList.add('show')
  if(_ft) clearTimeout(_ft)
  _ft=setTimeout(()=>el.classList.remove('show'),1800)
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); return }
  if ((e.ctrlKey||e.metaKey) && (e.key==='y'||(e.shiftKey&&e.key==='z'))) { e.preventDefault(); redo(); return }
  if (e.ctrlKey||e.metaKey||e.altKey) return
  const km={p:'pen',l:'line',r:'rect',c:'circle',a:'arrow',e:'eraser'}
  if (km[e.key]) setTool(km[e.key])
})

ipcRenderer.on('draw-remote-stroke',     (_,d)=>applyRemote(d))
ipcRenderer.on('draw-remote-cursor',     (_,{peerId,username,x,y})=>updateRemoteCursor(peerId,username,x,y))
ipcRenderer.on('draw-peer-disconnected', (_,{peerId})=>{
  if(remoteCursors[peerId]){remoteCursors[peerId].el.remove();delete remoteCursors[peerId]}
})
ipcRenderer.on('draw-screen-preview', (_,dataUrl)=>{
  if(dataUrl){screenImg.src=dataUrl;screenImg.style.display='block';emptyState.classList.add('hidden')}
  else{screenImg.style.display='none';screenImg.src='';checkEmptyState()}
})
ipcRenderer.on('draw-request-sync',  ()=>ipcRenderer.send('draw-full-sync-request'))
ipcRenderer.on('draw-send-sync',     ()=>ipcRenderer.send('draw-full-sync', canvas.toDataURL('image/jpeg', 0.7)))
ipcRenderer.on('draw-flash',         (_,msg)=>flash(msg))
ipcRenderer.on('draw-host-screen-size', (_,{width,height,isPeer})=>{
  const label=isPeer?`Écran de ton pote — ${width}×${height}`:`Mon écran — ${width}×${height}`
  setCanvasSize(width,height,label)
})</script>
